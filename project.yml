name: Crest
options:
  bundleIdPrefix: com.crest
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.1"
  generateEmptyDirectories: true

packages:
  Adhan:
    url: https://github.com/batoulapps/adhan-swift
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Crest:
    type: application
    platform: macOS
    sources:
      - path: Crest
        excludes:
          - ".agents/**"
          - ".claude/**"
          - ".github/**"
          - "crest/**"
          - "docs/**"
    dependencies:
      - package: Adhan
      - package: Sparkle
    info:
      path: Crest/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        SUFeedURL: "https://itsrafsanjani.github.io/crest/appcast.xml"
        SUPublicEDKey: "XwuY5nOkreRnwPKtbx3hdKDT7HvSH0JqxU/nyRNrk8o="
        NSCalendarsFullAccessUsageDescription: "Crest needs access to your calendars to show upcoming events and meeting links."
        NSCalendarsUsageDescription: "Crest needs access to your calendars to show upcoming events and meeting links."
        NSLocationUsageDescription: "Crest needs your location to calculate accurate prayer times."
    entitlements:
      path: Crest/Crest.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crest.app
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Crest/Info.plist
        CODE_SIGN_ENTITLEMENTS: Crest/Crest.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
